<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Um convite especial</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --blush:#F7E4E0;
    --rose:#D97D8B;
    --rose-deep:#B5495C;
    --plum:#4A2E35;
    --cream:#FFFBF8;
    --gold:#C9A15A;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    font-family:'Inter', sans-serif;
    background:
      radial-gradient(circle at 15% 20%, rgba(217,125,139,0.25), transparent 45%),
      radial-gradient(circle at 85% 80%, rgba(201,161,90,0.18), transparent 50%),
      linear-gradient(180deg, var(--blush), #F1D9D3);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
    overflow:hidden;
    position:relative;
  }
  .heart{
    position:absolute;
    opacity:.35;
    color:var(--rose);
    animation:float 9s ease-in-out infinite;
  }
  @keyframes float{
    0%,100%{ transform:translateY(0) rotate(0deg); }
    50%{ transform:translateY(-22px) rotate(8deg); }
  }
  @media (prefers-reduced-motion: reduce){
    .heart{ animation:none; }
  }

  .card{
    position:relative;
    z-index:1;
    width:100%;
    max-width:440px;
    background:var(--cream);
    border-radius:22px;
    padding:46px 38px;
    box-shadow:0 40px 80px -30px rgba(74,46,53,0.35);
    text-align:center;
  }
  .step{ display:none; animation:riseIn .5s cubic-bezier(.2,.8,.2,1) both; }
  .step.active{ display:block; }
  @keyframes riseIn{
    from{opacity:0; transform:translateY(14px);}
    to{opacity:1; transform:translateY(0);}
  }

  .eyebrow{
    font-family:'Playfair Display', serif;
    font-style:italic;
    color:var(--rose-deep);
    font-size:14px;
    margin-bottom:10px;
    letter-spacing:.02em;
  }
  h1{
    font-family:'Playfair Display', serif;
    font-weight:600;
    font-size:26px;
    color:var(--plum);
    line-height:1.35;
    margin-bottom:18px;
  }
  p.sub{
    font-size:14.5px;
    color:#8A6B6F;
    margin-bottom:26px;
    line-height:1.55;
  }

  input[type="text"]{
    width:100%;
    padding:14px 16px;
    border-radius:11px;
    border:1.5px solid #E8D2CE;
    background:#FFF;
    font-size:15.5px;
    font-family:inherit;
    color:var(--plum);
    margin-bottom:20px;
    text-align:center;
    transition:border-color .15s, box-shadow .15s;
  }
  input[type="text"]:focus{
    outline:none;
    border-color:var(--rose);
    box-shadow:0 0 0 3px rgba(217,125,139,0.18);
  }

  .btn{
    display:inline-block;
    width:100%;
    padding:14px;
    border:none;
    border-radius:11px;
    background:var(--rose-deep);
    color:#fff;
    font-weight:600;
    font-size:15px;
    font-family:inherit;
    cursor:pointer;
    transition:background .15s, transform .1s;
    margin-bottom:11px;
  }
  .btn:hover{ background:#9A3B4A; }
  .btn:active{ transform:scale(.98); }
  .btn.secondary{
    background:#fff;
    color:var(--rose-deep);
    border:1.5px solid var(--rose-deep);
  }
  .btn.secondary:hover{ background:#FCEFEC; }

  .options{ display:flex; flex-direction:column; gap:11px; margin-bottom:6px; }
  .opt-btn{
    padding:15px 16px;
    border-radius:11px;
    border:1.5px solid #E8D2CE;
    background:#fff;
    color:var(--plum);
    font-size:15px;
    font-weight:500;
    font-family:inherit;
    cursor:pointer;
    transition:border-color .15s, background .15s, transform .1s;
    text-align:left;
  }
  .opt-btn:hover{ border-color:var(--rose); background:#FCF3F1; transform:translateX(2px); }
  .opt-icon{ margin-right:10px; }

  .final-date{
    font-family:'Playfair Display', serif;
    font-style:italic;
    font-size:20px;
    color:var(--rose-deep);
    margin-top:6px;
  }

  #outro-wrap{ display:none; margin-top:6px; }
</style>
</head>
<body>

<!-- corações flutuando de fundo, decorativos -->
<svg class="heart" style="top:12%; left:8%; width:26px;" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21s-7.5-4.6-10-9.3C.4 8.4 2.3 5 5.6 5c2 0 3.4 1 4.4 2.4C11 6 12.4 5 14.4 5c3.3 0 5.2 3.4 3.6 6.7C19.5 16.4 12 21 12 21z"/></svg>
<svg class="heart" style="top:70%; left:12%; width:18px; animation-delay:2s;" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21s-7.5-4.6-10-9.3C.4 8.4 2.3 5 5.6 5c2 0 3.4 1 4.4 2.4C11 6 12.4 5 14.4 5c3.3 0 5.2 3.4 3.6 6.7C19.5 16.4 12 21 12 21z"/></svg>
<svg class="heart" style="top:20%; right:10%; width:20px; animation-delay:1s;" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21s-7.5-4.6-10-9.3C.4 8.4 2.3 5 5.6 5c2 0 3.4 1 4.4 2.4C11 6 12.4 5 14.4 5c3.3 0 5.2 3.4 3.6 6.7C19.5 16.4 12 21 12 21z"/></svg>
<svg class="heart" style="top:78%; right:14%; width:28px; animation-delay:3s;" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21s-7.5-4.6-10-9.3C.4 8.4 2.3 5 5.6 5c2 0 3.4 1 4.4 2.4C11 6 12.4 5 14.4 5c3.3 0 5.2 3.4 3.6 6.7C19.5 16.4 12 21 12 21z"/></svg>

<div class="card">

  <!-- ETAPA 1: nome -->
  <div class="step active" id="step-1">
    <p class="eyebrow">Antes de tudo...</p>
    <h1>Qual é o seu nome?</h1>
    <input type="text" id="input-nome" placeholder="Digite seu nome aqui">
    <button class="btn" id="btn-1">Continuar</button>
  </div>

  <!-- ETAPA 2: elogio -->
  <div class="step" id="step-2">
    <p class="eyebrow">💌</p>
    <h1 id="mensagem-elogio"></h1>
    <button class="btn" id="btn-2">Continuar</button>
  </div>

  <!-- ETAPA 3: convite -->
  <div class="step" id="step-3">
    <p class="eyebrow">A pergunta</p>
    <h1>Você aceitaria sair comigo para...</h1>
    <div class="options">
      <button class="opt-btn" data-opcao="tomar um sorvete">🍦 Tomar um sorvete</button>
      <button class="opt-btn" data-opcao="comer um hambúrguer">🍔 Comer um hambúrguer</button>
      <button class="opt-btn" data-opcao="outro">✨ Outro...</button>
    </div>
    <div id="outro-wrap">
      <input type="text" id="input-outro" placeholder="O que você sugere?">
      <button class="btn" id="btn-outro">Confirmar</button>
    </div>
  </div>

  <!-- ETAPA 4: brincadeira -->
  <div class="step" id="step-4">
    <p class="eyebrow">🏆</p>
    <h1 id="mensagem-brincadeira"></h1>
    <button class="btn" id="btn-4">Continuar</button>
  </div>

  <!-- ETAPA 5: final -->
  <div class="step" id="step-5">
    <p class="eyebrow">✔️ Tudo certo</p>
    <h1>Seu relatório foi enviado para João Bosco.</h1>
    <p class="sub">Ele já está avisado — e ansioso.</p>
    <p class="final-date">Te espero lá no dia 10/07/2026 💛</p>
  </div>

</div>

<script>
  let nome = "";
  let escolha = "";

  function irPara(idEtapa){
    document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
    document.getElementById(idEtapa).classList.add('active');
  }

  // Etapa 1 -> 2
  document.getElementById('btn-1').addEventListener('click', () => {
    const valor = document.getElementById('input-nome').value.trim();
    nome = valor.length ? valor : "você";
    document.getElementById('mensagem-elogio').textContent = `Você é muito bonita, ${nome}.`;
    irPara('step-2');
  });
  document.getElementById('input-nome').addEventListener('keydown', (e) => {
    if(e.key === 'Enter') document.getElementById('btn-1').click();
  });

  // Etapa 2 -> 3
  document.getElementById('btn-2').addEventListener('click', () => irPara('step-3'));

  // Etapa 3 -> 4
  document.querySelectorAll('.opt-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const opcao = btn.dataset.opcao;
      if(opcao === 'outro'){
        document.getElementById('outro-wrap').style.display = 'block';
        return;
      }
      escolha = opcao;
      mostrarBrincadeira();
    });
  });
  document.getElementById('btn-outro').addEventListener('click', () => {
    const valor = document.getElementById('input-outro').value.trim();
    escolha = valor.length ? valor : "algo surpreendente";
    mostrarBrincadeira();
  });

  function mostrarBrincadeira(){
    document.getElementById('mensagem-brincadeira').textContent =
      "Uma garota não escolheria isso, mas como você é uma mulher... Meus parabéns, ótimo gosto!";
    irPara('step-4');
  }

  // Etapa 4 -> 5
  document.getElementById('btn-4').addEventListener('click', () => irPara('step-5'));
</script>
</body>
</html>
